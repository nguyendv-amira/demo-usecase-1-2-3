<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinRich – Chatbot Bot A/B UC-01/02/03</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  /* PinRich Design Tokens */
  --navy:  #0A3970; /* primary */
  --navy2: #0d4c8f; /* primary hover */
  --navy3: #083060; /* primary dark */
  --navyL: #0d4c8f;
  --secondary: #00B7C2;
  /* Neutral */
  --white:    #FFFFFF;
  --gray:     #F4F4F4;  /* lightest */
  --grayB:    #E3E3E3;  /* light / border */
  --text:     #212121;  /* text primary */
  --muted:    #666666;  /* text secondary */
  --disabled: #999999;
  /* Semantic */
  --red:   #FF4C51;   /* error */
  --green: #2E7D32;   /* success */
  --buy:   #F3A556;
  /* Shadows */
  --sh1: 0px 0px 40px 0px rgba(33,37,41,0.05);
  --sh2: 0px 2px 2px 0px rgba(33,37,41,0.06), 0px 0px 10px 0px rgba(33,37,41,0.08);
  /* Radius tokens */
  --r-large:  10px;
  --r-medium: 8px;
  --r-small:  4px;
  /* Layout */
  --nav-h:60px;--trigger-h:54px;--inp-h:135px;--panel-h:430px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:20px;overflow:hidden}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--white);display:flex;align-items:center;padding:0 40px;border-bottom:1px solid var(--grayB);z-index:300}
.logo{font-size:20px;font-weight:900;color:var(--navy);letter-spacing:-.5px;margin-right:48px}
.nav-links{display:flex;gap:4px;flex:1}
.nav-dd{display:flex;align-items:center;gap:4px;padding:6px 14px;border-radius:var(--r-medium);font-size:14px;color:var(--text);cursor:pointer;transition:background .14s;min-height:48px;align-items:center}
.nav-dd:hover{background:var(--gray)}
.nav-dd svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2.5}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn-login{padding:0 22px;height:48px;border-radius:var(--r-medium);background:var(--navy);color:var(--white);font-size:14px;font-weight:700;font-family:inherit;border:none;cursor:pointer;min-height:48px}
.btn-contact{padding:0 20px;height:48px;border-radius:var(--r-medium);background:transparent;color:var(--text);font-size:14px;font-family:inherit;border:1px solid var(--grayB);cursor:pointer;min-height:48px}

/* HERO */
.hero{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 80px;overflow:hidden;z-index:100}
.hero-left{max-width:520px;z-index:1}
.hero-badges{display:flex;gap:8px;margin-bottom:18px}
.hero-badge{padding:3px 12px;border-radius:4px;background:rgba(255,255,255,.15);font-size:12px;font-weight:500;color:rgba(255,255,255,.85)}
.hero-title{font-size:clamp(36px,4vw,56px);font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1px;margin-bottom:18px}
.hero-body{font-size:14px;color:rgba(255,255,255,.6);line-height:1.85;font-weight:400;margin-bottom:30px;max-width:460px}
.hero-cta{padding:12px 28px;border-radius:var(--r8);background:#fff;color:var(--navy);font-size:14px;font-weight:700;font-family:inherit;border:none;cursor:pointer;min-height:48px}
.hero-right{position:relative;z-index:1;flex-shrink:0}
.pin-wrap{width:220px;height:250px;position:relative}
.pin-body{width:210px;height:210px;border-radius:50% 50% 50% 50%/55% 55% 45% 45%;background:rgba(255,255,255,.11);border:2px solid rgba(255,255,255,.2);position:absolute;top:0;left:5px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pin-body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.2) 1px,transparent 1px);background-size:13px 13px}
.pin-star{width:105px;height:105px;position:relative;z-index:1}
.pin-tip{width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-top:42px solid rgba(255,255,255,.11);position:absolute;bottom:0;left:50%;transform:translateX(-50%)}

/* CHAT OVERLAY */
.chat-overlay{position:fixed;left:0;right:0;bottom:0;z-index:200;height:calc(var(--trigger-h) + var(--inp-h));transition:height .38s cubic-bezier(.4,0,.2,1)}
.chat-overlay.open{height:calc(var(--trigger-h) + var(--panel-h) + var(--inp-h))}
/* trigger bar — matches screenshot exactly */
.chat-trigger{
  height:var(--trigger-h);background:var(--navy2);
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:0 40px;cursor:pointer;user-select:none;
  position:relative;transition:background .15s;
  border-top:1px solid rgba(255,255,255,.08);
}
.chat-trigger:hover{background:var(--navyL)}
/* dash handle on top */
.chat-trigger::before{
  content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:32px;height:3px;border-radius:2px;background:rgba(255,255,255,.25);
}
.ct-icon{color:var(--secondary);font-size:17px;flex-shrink:0}
.ct-text{color:#fff;font-size:14px;font-weight:500}
/* no arrow — hidden */
.ct-arrow{display:none}

/* CHAT PANEL */
.chat-panel{height:var(--panel-h);background:var(--gray);display:none;flex-direction:column;overflow:hidden}
.chat-panel.open{display:flex}

/* UC STRIP */
.uc-strip{display:none}
.uc-tag{font-size:10px;font-weight:700;color:#1a56db;background:rgba(26,86,219,.1);padding:2px 8px;border-radius:8px;white-space:nowrap;transition:all .25s}
.uc-tag.g{color:var(--green);background:rgba(22,163,74,.12)}
.uc-tag.o{color:#ea580c;background:rgba(234,88,12,.12)}
.uc-title{font-size:11px;color:var(--muted)}

/* bot mode pill */
/* MESSAGES */
.msgs{flex:1;min-height:0;overflow-y:auto;padding:18px 28px 10px;display:flex;flex-direction:column;gap:12px;background:var(--gray);scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--grayB);border-radius:var(--r-small)}
.msgs.hidden{display:none}

.ddiv{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:2px}
.ddiv::before,.ddiv::after{content:'';flex:1;height:1px;background:var(--grayB)}

.row{display:flex;gap:8px;max-width:100%}
.row.bot{align-items:flex-end}
.row.user{flex-direction:row-reverse}
.bav{width:32px;height:32px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.bav svg{width:14px;height:14px;fill:white}
.bub{max-width:76%;padding:12px;border-radius:var(--r-large);font-size:14px;line-height:20px;word-break:break-word}
.bot .bub{background:var(--white);border:1px solid var(--grayB);border-bottom-left-radius:var(--r-small);color:var(--text);box-shadow:var(--sh1)}
.user .bub{background:var(--white);color:var(--text);border:1px solid var(--grayB);border-bottom-right-radius:var(--r-small);box-shadow:var(--sh1)}
.mt{font-size:12px;color:var(--muted);margin-top:4px}
.bot .mt{text-align:left}.user .mt{text-align:right}
.bub h3{font-size:14px;font-weight:700;color:var(--navy);margin:8px 0;padding-bottom:6px;border-bottom:1px solid var(--grayB)}
.bub ul{padding-left:15px;margin:5px 0}
.bub li{margin:4px 0;font-size:14px;line-height:20px}
.bub strong{font-weight:700;color:var(--navy)}
.bub p{margin:3px 0}

/* typing */
.trow{display:flex;align-items:flex-end;gap:8px}
.tbub{background:var(--white);border:1px solid var(--grayB);border-radius:var(--r-large);border-bottom-left-radius:var(--r-small);padding:12px;display:flex;gap:4px;align-items:center;box-shadow:var(--sh1)}
.tbub span{width:6px;height:6px;border-radius:50%;background:var(--grayB);animation:td 1.2s infinite}
.tbub span:nth-child(2){animation-delay:.14s}
.tbub span:nth-child(3){animation-delay:.28s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px);background:var(--navy)}}

/* error */
.ebub{background:rgba(255,76,81,0.06);border:1px solid rgba(255,76,81,0.3);border-radius:var(--r-large);padding:12px;font-size:14px;color:var(--red);display:flex;gap:8px;align-items:flex-start}
.ebub svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;stroke:currentColor;fill:none;stroke-width:2}

/* ACTION DOCK */
.action-dock{flex-shrink:0;display:none;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 24px 12px;background:var(--gray);border-top:1px solid var(--grayB)}
.action-dock.visible{display:flex}
.adlabel{font-size:12px;color:var(--muted);margin-right:4px;white-space:nowrap}
.act{height:48px;padding:0 24px;border-radius:var(--r-medium);font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;border:1px solid;transition:all .13s;white-space:nowrap;display:inline-flex;align-items:center}
.act.ok{border-color:var(--green);color:var(--green);background:rgba(46,125,50,0.08)}
.act.ok:hover{background:var(--green);color:var(--white)}
.act.ng{border-color:var(--red);color:var(--red);background:rgba(255,76,81,0.06)}
.act.ng:hover{background:var(--red);color:var(--white)}
.act:disabled{opacity:.4;cursor:not-allowed}

/* PROCESSING SCREEN */
.proc-screen{flex:1;min-height:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--gray);padding:24px}
.proc-screen.visible{display:flex}
.proc-title{font-size:14px;font-weight:700;color:var(--navy)}
.proc-steps{display:flex;flex-direction:column;gap:8px;width:100%;max-width:340px}
.ps{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-large);background:var(--white);box-shadow:var(--sh1);font-size:14px;color:var(--muted);transition:all .3s;min-height:48px}
.ps.active{color:var(--navy);box-shadow:var(--sh2)}
.ps.done{color:var(--green);background:rgba(46,125,50,0.06)}
.ps-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.ps-spin{width:14px;height:14px;border-radius:50%;border:2px solid var(--grayB);border-top-color:var(--navy);animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* DONE SCREEN */
.done-screen{flex:1;min-height:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--gray);padding:24px;text-align:center}
.done-screen.visible{display:flex}
.done-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.done-circle.g{background:rgba(46,125,50,0.1);border:2px solid rgba(46,125,50,0.3)}
.done-circle.o{background:rgba(243,165,86,0.12);border:2px solid rgba(243,165,86,0.3)}
.done-title{font-size:16px;font-weight:700;color:var(--navy);line-height:24px}
.done-body{font-size:14px;color:var(--muted);line-height:20px;max-width:300px}
.done-body strong{color:var(--text);font-weight:700}
.slack-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-medium);font-size:12px;font-weight:500}
.slack-pill.purple{background:#4a154b;color:#fff}
.slack-pill.orange{background:#ea580c;color:#fff}
.slack-pill svg{width:13px;height:13px;fill:currentColor}
.done-note{font-size:12px;color:var(--disabled)}
.sys-msg{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 0;font-size:12px;color:var(--muted)}
.sys-msg-line{flex:1;height:1px;background:var(--grayB)}
.sys-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.sys-pill.g{background:rgba(46,125,50,0.1);color:var(--green);border:1px solid rgba(46,125,50,0.25)}
.sys-pill.o{background:rgba(243,165,86,0.12);color:#b45309;border:1px solid rgba(243,165,86,0.3)}
.back-btn{margin-top:4px;padding:8px 22px;border-radius:8px;background:transparent;border:1.5px solid var(--grayB);color:var(--muted);font-size:12.5px;font-family:inherit;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--navy);color:var(--navy)}

/* UC-03 FORM */
.form-screen{flex:1;min-height:0;overflow-y:auto;padding:0;display:none;flex-direction:column;background:var(--gray)}
.form-screen.visible{display:flex}
.form-body{padding:14px 24px 10px;display:flex;flex-direction:column;gap:11px;flex:1}
.form-intro{border-radius:var(--r-large);padding:12px;font-size:14px;line-height:20px;border:1px solid}
.form-intro.o{background:rgba(243,165,86,0.08);border-color:rgba(243,165,86,0.4);color:#9a3412}
.form-intro.b{background:rgba(10,57,112,.06);border-color:rgba(10,57,112,.2);color:var(--navy)}
.form-intro ul{padding-left:16px;margin-top:6px}
.form-intro li{margin:4px 0;font-size:14px}
.form-intro .priv{font-size:12px;color:var(--disabled);margin-top:8px}
/* status selector */
.status-row{display:flex;gap:8px}
.status-btn{flex:1;height:48px;border-radius:var(--r-medium);border:1px solid var(--grayB);background:var(--white);font-family:inherit;font-size:14px;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;font-weight:500}
.status-btn:hover{border-color:var(--navy);color:var(--navy)}
.status-btn.sel{border-color:var(--navy);background:var(--navy);color:var(--white)}
/* fields */
.form-row2{display:flex;flex-direction:column;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:3px}
.req{font-size:12px;color:var(--red);font-weight:700}
.finput{padding:0 12px;height:48px;border:none;border-radius:var(--r-large);font-family:inherit;font-size:14px;font-weight:500;line-height:26px;color:var(--muted);background:#F8F8F8;outline:none;transition:box-shadow .14s;width:100%}
.finput:focus{box-shadow:inset 0 0 0 1px var(--text)}
.finput::placeholder{color:var(--disabled)}
.finput.err{box-shadow:inset 0 0 0 1px var(--red)}
.fselect{padding:0 12px;height:48px;border:none;border-radius:var(--r-large);font-family:inherit;font-size:14px;font-weight:500;color:var(--muted);background:#F8F8F8;outline:none;appearance:none;cursor:pointer;transition:box-shadow .14s;width:100%}
.fselect:focus{box-shadow:inset 0 0 0 1px var(--text)}
.fsec{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-top:8px;text-transform:uppercase}
/* db lookup result */
.db-result{background:rgba(46,125,50,0.08);border:1px solid rgba(46,125,50,0.25);border-radius:var(--r-large);padding:12px;font-size:14px;color:var(--text);line-height:20px;display:flex;flex-direction:column;gap:6px}
.db-result-title{font-size:12px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:5px}
.db-err{background:rgba(255,76,81,0.06);border:1px solid rgba(255,76,81,0.3);border-radius:var(--r-large);padding:12px;font-size:14px;color:var(--red);line-height:20px}
/* pricing table */
.price-table{width:100%;border-collapse:collapse;font-size:12px}
.price-table th{background:var(--navy);color:var(--white);padding:8px 12px;text-align:left;font-weight:700;font-size:14px}
.price-table td{padding:8px 12px;border-bottom:1px solid var(--grayB);color:var(--text);font-size:14px}
.price-table tr:last-child td{border-bottom:none}
.price-table tr:nth-child(even) td{background:var(--c-lightest)}
.price-note{font-size:12px;color:var(--muted);margin-top:8px}
.pdf-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:48px;border-radius:var(--r-medium);background:var(--red);color:var(--white);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .14s;margin-top:8px}
.pdf-btn:hover{background:#b91c1c}
.pdf-btn svg{width:16px;height:16px;fill:#fff}

/* SUBMIT BAR */
.submit-bar{flex-shrink:0;padding:12px 24px;background:var(--gray);border-top:1px solid var(--grayB);display:none;flex-direction:column;gap:8px}
.submit-bar.visible{display:flex}
.submit-btn{width:100%;height:48px;background:var(--navy);color:var(--white);border:none;border-radius:var(--r-medium);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .14s}
.submit-btn:hover{background:var(--navyL)}
.submit-note{font-size:12px;color:var(--muted);text-align:center}
.submit-note a{color:var(--navy)}

/* INPUT */
.inp-area{flex-shrink:0;padding:12px 80px 16px;background:var(--gray);border-top:none}
.inp-area.hidden{display:none}
.inp-area.always{display:flex!important;flex-direction:column}
.inp-row{display:flex;align-items:flex-end;gap:0;background:#F8F8F8;border-radius:var(--r-large);box-shadow:var(--sh2);padding:10px 10px 10px 12px;min-height:48px;transition:box-shadow .14s}
.inp{flex:1;padding:2px 4px;border:none;background:transparent;resize:none;outline:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;line-height:26px;color:var(--muted);max-height:88px;min-height:26px;overflow-y:auto}
.inp::placeholder{color:var(--disabled)}
.send{width:32px;height:32px;border-radius:50%;background:#333333;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;transition:transform .13s,background .13s}
.send:hover{background:#131313;transform:scale(1.06)}
.send svg{width:16px;height:16px;fill:#fff}
/* send icon — down arrow like screenshot */
.inp-foot{text-align:center;margin-top:8px;font-size:12px;color:var(--disabled)}

/* KB error btn */
/* ── bot toggle switch ── */
.bot-toggle-wrap{
  display:flex;align-items:center;gap:8px;
  padding:0 2px 8px;
}
.toggle-track{
  width:36px;height:20px;border-radius:10px;
  background:#d1d5db;
  position:relative;cursor:pointer;
  transition:background .2s;flex-shrink:0;
  border:none;padding:0;
}
.toggle-track.on{background:var(--navy)}
.toggle-thumb{
  position:absolute;top:2px;left:2px;
  width:16px;height:16px;border-radius:50%;
  background:var(--white);
  transition:transform .2s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-track.on .toggle-thumb{transform:translateX(16px)}
.toggle-label{
  font-size:13px;font-weight:500;
  color:var(--navy);
  cursor:pointer;user-select:none;
  transition:color .2s;
}
.toggle-label.on{color:var(--navy)}
/* KB error bottom right */
.kb-err-btn{
  position:fixed;bottom:20px;right:20px;z-index:9000;
  padding:5px 10px;border-radius:var(--r-medium);
  background:rgba(19,19,19,.7);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.35);font-size:11px;font-family:inherit;
  cursor:pointer;transition:all .14s;
}
.kb-err-btn:hover{background:rgba(255,76,81,.75);color:var(--white);border-color:transparent}
.mode-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
</style>
</head>
<body>

<nav class="nav">
  <span class="logo">PinRich</span>
  <div class="nav-links">
    <span class="nav-dd">プロダクト <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
    <span class="nav-dd">ソリューション <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></span>
  </div>
  <div class="nav-right">
    <button class="btn-login">ログイン</button>
    <button class="btn-contact">営業に問い合わせ</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-left">
    <div class="hero-badges"><span class="hero-badge">売買</span><span class="hero-badge">賃貸</span></div>
    <h1 class="hero-title">不動産データとAI</h1>
    <p class="hero-body">ピンリッチは、不動産業界に特化した総合データソリューションカンパニーです。仲介から買取・投資まで、あらゆる不動産事業者に向けて、データを活用した業務効率化と新たな価値創出を支援します。</p>
    <button class="hero-cta">営業に問い合わせ</button>
  </div>
  <div class="hero-right">
    <div class="pin-wrap">
      <div class="pin-body">
        <svg class="pin-star" viewBox="0 0 100 100" fill="none">

<script>
/* ══ state ══ */
let isOpen=false, hasGreeted=false, userHasSent=false;
let botMode='A'; // 'A' = not logged in, 'B' = logged in

/* mock logged-in user (Bot B) */
const mockUser={name:'田中 健太',company:'株式会社ABC不動産',email:'kenta@abc-re.co.jp',tel:'03-1234-5678',license:'東京都知事(3)第12345号',products:['PinRich 不動産仲介','査定書作成']};

function selectBot(mode){
  if(botMode === mode) return;

  // reset chat
  document.getElementById('msgs').innerHTML='<div class="ddiv">今日</div><div id="chat-bottom"></div>';
  hideDock();
  userHasSent=false; hasGreeted=false;
  showOnly('msgs');
  if(isOpen){ isOpen=false; document.getElementById('chat-overlay').classList.remove('open'); document.getElementById('chat-panel').classList.remove('open'); }

  botMode = mode;

  // update toggle UI
  const track = document.getElementById('bot-toggle');
  const label = document.getElementById('toggle-label');
  if(mode==='B'){
    track.classList.add('on');
    label.classList.add('on');
    label.textContent = 'ログイン済み';
  } else {
    track.classList.remove('on');
    label.classList.remove('on');
    label.textContent = '未ログイン';
  }
}


/* ══ panel ══ */
function togglePanel(){
  isOpen=!isOpen;
  document.getElementById('chat-overlay').classList.toggle('open',isOpen);
  document.getElementById('chat-panel').classList.toggle('open',isOpen);
  setTimeout(()=>document.getElementById('inp').focus(),isOpen?380:0);
  if(isOpen&&!hasGreeted){hasGreeted=true;greet()}
}
function greet(){
  setTimeout(()=>{
    addTyping();
    setTimeout(()=>{
      rmTyping();
      if(botMode==='B'){
        addBotRaw(`<p><strong>こんにちは、${mockUser.name}さん！</strong></p><p style="margin-top:6px">PinRich AIアシスタントです。ご利用中の製品（${mockUser.products.join('・')}）の使い方や、業務に関するご質問をお気軽にどうぞ。</p>`);
      } else {
        addBotRaw(`<p><strong>こんにちは！PinRichのAIアシスタント</strong>です。</p><p style="margin-top:6px">業務課題のご相談や製品・料金のご案内など、お気軽にお話しください。</p>`);
      }
    },900);
  },400);
}

/* ══ message helpers ══ */
function ins(el){const m=document.getElementById('msgs'),b=document.getElementById('chat-bottom');m.insertBefore(el,b)}
function addUser(html){
  userHasSent=true;
  const d=document.createElement('div');d.className='row user';
  d.innerHTML=`<div><div class="bub">${html}</div><div class="mt">${now()}</div></div>`;
  ins(d);scrollB();hideDock();
}
function addBot(html,cards){addBotRaw(html,cards);if(userHasSent)showDock()}
function addBotRaw(html,cards){
  let ch='';
  if(cards&&cards.length)ch=cards.map(c=>`<div class="pc"><div class="pch"><span class="pbadge${c.top?' top':''}">${c.badge}</span><span class="pn">${c.name}</span></div><div class="pd">${c.desc}</div><div class="pr2"><b>✓ おすすめ理由：</b>${c.reason}</div></div>`).join('');
  const d=document.createElement('div');d.className='row bot';
  d.innerHTML=`<div class="bav"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><div><div class="bub">${html}${ch}</div><div class="mt">${now()}</div></div>`;
  ins(d);scrollB();
}
function addTyping(){
  const d=document.createElement('div');d.id='typr';d.className='trow';
  d.innerHTML=`<div style="width:28px;height:28px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:2px"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><div class="tbub"><span></span><span></span><span></span></div>`;
  ins(d);scrollB();
}
function rmTyping(){const t=document.getElementById('typr');if(t)t.remove()}
function addErr(html){
  const d=document.createElement('div');d.className='row bot';
  d.innerHTML=`<div class="bav"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg></div><div><div class="ebub"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${html}</span></div><div class="mt">${now()}</div></div>`;
  ins(d);scrollB();
}



/* ══ dock ══ */
function showDock(){
  const dock=document.getElementById('action-dock');
  if(!dock) return;
  dock.classList.add('visible');
  ['ok','ng'].forEach(t=>{const b=document.getElementById('act-'+t);if(b){b.disabled=false;b.className='act '+t}});
}
function hideDock(){
  const dock=document.getElementById('action-dock');
  if(dock) dock.classList.remove('visible');
}

/* ══ UC routing ══ */
function doAct(type){
  hideDock();
  if(type==='ok') startUC02();
  else startUC03();
}

/* ── UC-02: ✅ resolved ──
   Bot A → Trigger #4 → #hp-bot
   Bot B → Trigger #8 → #dashboard-bot */
function startUC02(){
  setUCLabel('UC-02','g','チャット完了処理中…');
  showOnly('proc-screen');
  const isBotB = (botMode === 'B');
  const steps=isBotB
    ?[{id:'ps0',icon:'🤖',label:'AIがチャット履歴を要約中...',done:'チャット要約完了（〜200文字）',ms:1100},
      {id:'ps1',icon:'🗄️',label:'DBからお客様情報を取得中...',done:`顧客情報取得完了（${mockUser.company}）`,ms:900},
      {id:'ps2',icon:'📨',label:'Slack #dashboard-bot へ通知中...',done:'Trigger #8 送信完了 ✓',ms:800},
      {id:'ps3',icon:'💾',label:'セッション記録中...',done:'完了・1日後自動削除',ms:600}]
    :[{id:'ps0',icon:'🤖',label:'AIがチャット履歴を要約中...',done:'チャット要約完了（〜200文字）',ms:1100},
      {id:'ps1',icon:'📨',label:'Slack #hp-bot へ通知中...',done:'Trigger #4 送信完了 ✓',ms:900},
      {id:'ps2',icon:'💾',label:'セッション記録中...',done:'完了・1日後自動削除',ms:600}];

  document.getElementById('proc-title').textContent='チャット完了処理中...';
  buildProcSteps(steps);
  runSteps(steps,()=>{
    const channel=isBotB?'#dashboard-bot（Trigger #8）':'#hp-bot（Trigger #4）';
    const pillClass=isBotB?'orange':'purple';
    setUCLabel('UC-02','g','チャット完了（✅ 解決済み）');
    showRedirectCountdown('done-screen', 2, ()=>{
      backToChat(
        `✅ Slack ${channel} に通知済み`, 'g',
        '<p>ありがとうございました！引き続き何かご質問があればお気軽にどうぞ。</p>'
      );
    }, `<div class="done-circle g">✅</div>
      <div class="done-title">ありがとうございました！</div>
      <div class="done-body">ご質問が解決されてよかったです。</div>
      <div class="slack-pill ${pillClass}">${slackSvg()} Slack ${channel} に通知済み</div>
      <div class="done-note">履歴は1日後に自動削除されます</div>`);
  });
}

/* ── UC-03: ❌ unresolved ──
   Bot A → show form → Trigger #1 → #hp-bot
   Bot B → processing → Trigger #6 → #dashboard-bot */
function startUC03(){
  if(botMode==='B'){
    // Bot B: no form — AI summary → DB → Slack #dashboard-bot Trigger #6
    setUCLabel('UC-03','o','エスカレーション処理中（Bot B）');
    showOnly('proc-screen');
    const steps=[
      {id:'ps0',icon:'🤖',label:'AIがチャット履歴を要約中...',done:'チャット要約完了（〜200文字）',ms:1100},
      {id:'ps1',icon:'🗄️',label:'DBからお客様情報を取得中...',done:`顧客情報取得完了（${mockUser.company}）`,ms:900},
      {id:'ps2',icon:'📨',label:'Slack #dashboard-bot へ通知中...',done:'Trigger #6 送信完了 ✓',ms:800},
      {id:'ps3',icon:'💾',label:'セッション記録中...',done:'完了・解決まで保持',ms:600}];
    document.getElementById('proc-title').textContent='担当営業への通知処理中...';
    buildProcSteps(steps);
    runSteps(steps,()=>{
      setUCLabel('UC-03','o','エスカレーション完了（Bot B · ❌ 未解決）');
      showRedirectCountdown('done-screen', 2, ()=>{
        backToChat(
          '❌ 担当営業へ通知済み（Slack #dashboard-bot · Trigger #6）', 'o',
          '<p>担当営業より<strong>2営業日以内</strong>にご連絡いたします。他にご質問があればお気軽にどうぞ。</p>'
        );
      }, `<div class="done-circle o">📋</div>
        <div class="done-title">担当者に通知しました</div>
        <div class="done-body">担当営業より<strong>2営業日以内</strong>にご連絡いたします。</div>
        <div class="slack-pill orange">${slackSvg()} Slack #dashboard-bot（Trigger #6）に通知済み</div>
        <div class="done-note">履歴は解決済みになるまで保持されます</div>`);
    });
  } else {
    // Bot A: show UC-03 form

/* ── form submit: smart routing based on which fields exist ── */
function submitForm(){
  // Case: existing customer email lookup
  const adminEl = document.getElementById('f-admin-email');
  if(adminEl){
    const email = adminEl.value.trim();
    if(!email){ adminEl.classList.add('err'); return; }
    adminEl.classList.remove('err');
    doDBLookup(email);
    return;
  }
  // Case: new customer manual form
  const fields = ['f-company','f-name','f-email','f-tel'];
  let valid = true;
  fields.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(!el.value.trim()){el.classList.add('err');valid=false;}
    else el.classList.remove('err');
  });
  if(!valid)return;
  submitNewCustomer();
}

/* ══ redirect countdown ══ */
function showRedirectCountdown(screenId, secs, onDone, innerHtml){
  showOnly(screenId);
  const el = document.getElementById(screenId);
  const counterId = 'cdown-'+Date.now();
  el.innerHTML = innerHtml + `<div class="done-note" id="${counterId}">${secs}秒後にチャットへ戻ります...</div>`;
  let t = secs;
  const iv = setInterval(()=>{
    t--;
    const cd = document.getElementById(counterId);
    if(cd) cd.textContent = t > 0 ? `${t}秒後にチャットへ戻ります...` : 'チャットへ戻ります...';
    if(t <= 0){ clearInterval(iv); onDone(); }
  }, 1000);
}

/* ══ proc step helpers ══ */
function buildProcSteps(steps){
  const c=document.getElementById('proc-steps');c.innerHTML='';
  steps.forEach(s=>{
    const d=document.createElement('div');d.className='ps';d.id=s.id;
    d.innerHTML=`<span class="ps-icon">${s.icon}</span><span>${s.label}</span>`;
    c.appendChild(d);
  });
}
function runSteps(steps,onDone,i=0){
  if(i>=steps.length){setTimeout(onDone,200);return}
  const el=document.getElementById(steps[i].id);
  el.classList.add('active');
  el.querySelector('.ps-icon').outerHTML='<div class="ps-spin"></div>';
  setTimeout(()=>{
    el.classList.remove('active');el.classList.add('done');
    el.querySelector('.ps-spin').outerHTML=`<span class="ps-icon">✓</span>`;
    el.querySelector('span:last-child').textContent=steps[i].done;
    runSteps(steps,onDone,i+1);
  },steps[i].ms);
}

/* ══ screen manager — only one visible at a time ══ */
function showOnly(id){
  const screens=['msgs','proc-screen','done-screen','form-screen'];
  screens.forEach(s=>{
    const el=document.getElementById(s);
    if(!el) return;
    if(s===id){
      el.classList.remove('hidden');
      if(s!=='msgs') el.classList.add('visible');
    } else {
      if(s==='msgs') el.classList.add('hidden');
      else el.classList.remove('visible');
    }
  });
  const sb=document.getElementById('submit-bar');
  if(sb && id!=='form-screen') sb.classList.remove('visible');
}
